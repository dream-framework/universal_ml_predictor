name: deploy-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Auto-deploys the public/ folder to GitHub Pages on every push to main.
# No setup needed beyond enabling Pages in repo settings.
#
# After your first push:
#   1. Go to repo → Settings → Pages
#   2. Source: GitHub Actions (not "Deploy from branch")
#   3. That's it — this workflow handles the rest.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
          # Keep .nojekyll so GitHub Pages doesn't strip _-prefixed files
          # (we don't have any, but it's a free safety net)
          enable_jekyll: false
